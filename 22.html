<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>MindAR 綜合互動作業</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body {
            margin: 0; 
            padding: 0;
            width: 100%; 
            height: 100%;
            overflow: hidden;
        }
        
        a-scene {
            width: 100%; 
            height: 100%;
            position: fixed; 
            top: 0; 
            left: 0;
        }

        /* 隱藏 MindAR 預設 UI，若想保留引導畫面可將其刪除 */
        .mindar-ui-loading,
        .mindar-ui-error,
        .mindar-ui-scanning {
            display: none;
        }

        /* 自訂文字的外層 DIV */
        #custom-text {
            display: none; /* 預設隱藏，由 JS 控制顯示 */
            position: fixed;
            bottom: calc(30px + env(safe-area-inset-bottom)); 
            width: max-content;
            max-width: 80%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(106, 167, 203, 0.85);
            color: white;
            padding: 0.5em 1em;
            font-size: 1.5em;
            border-radius: 0.3em;
            z-index: 9999;
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="custom-text">這是我的新作業哦哦</div>

    <a-scene
        mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: false; uiError: false; uiScanning: false;"
        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable"
    >
        <a-assets>
            <img id="resultImg" src="card1.jpg" />
        </a-assets>

        <a-light type="ambient" intensity="3"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target">
            <a-plane
                src="#resultImg"
                class="clickable"
                width="1.2"
                height="0.7"
                position="0 0 0"
                touch-transform
            ></a-plane>
        </a-entity>
    </a-scene>

    <script>
        // 註冊手勢控制組件（旋轉、縮放、雙擊重設）
        AFRAME.registerComponent('touch-transform', {
            init: function () {
                const el = this.el;
                this.defaultScale = el.object3D.scale.x;
                this.currentScale = this.defaultScale;
                this.prevDistance = null;
                this.prevAngle = null;
                this.lastTap = 0;

                // 雙擊重設大小與旋轉
                el.addEventListener('click', () => {
                    const now = Date.now();
                    if (now - this.lastTap < 300) {
                        el.object3D.scale.set(this.defaultScale, this.defaultScale, this.defaultScale);
                        el.object3D.rotation.set(0, 0, 0);
                        this.currentScale = this.defaultScale;
                    }
                    this.lastTap = now;
                });

                const canvas = el.sceneEl.canvas;

                // 兩指觸控開始
                canvas.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 2) {
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        this.prevDistance = Math.hypot(dx, dy);
                        this.prevAngle = Math.atan2(dy, dx);
                    }
                });

                // 兩指移動中
                canvas.addEventListener('touchmove', (e) => {
                    if (e.touches.length === 2 && this.prevDistance !== null) {
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        const dist = Math.hypot(dx, dy);
                        const angle = Math.atan2(dy, dx);

                        // 縮放計算
                        const scaleFactor = dist / this.prevDistance;
                        this.currentScale *= scaleFactor;
                        this.currentScale = Math.min(Math.max(this.currentScale, 0.5), 3);
                        el.object3D.scale.set(this.currentScale, this.currentScale, this.currentScale);

                        // 旋轉計算（對 Z 軸進行平面旋轉）
                        const deltaAngle = angle - this.prevAngle;
                        const rot = el.object3D.rotation;
                        el.object3D.rotation.set(rot.x, rot.y, rot.z + deltaAngle);

                        this.prevDistance = dist;
                        this.prevAngle = angle;
                        e.preventDefault();
                    }
                });

                // 觸控結束
                canvas.addEventListener('touchend', () => {
                    if (el.sceneEl.canvas.touches && el.sceneEl.canvas.touches.length < 2) {
                        this.prevDistance = null;
                        this.prevAngle = null;
                    }
                });
            }
        });

        // 監聽掃描事件，控制文字顯示與隱藏
        window.addEventListener("load", () => {
            const targetEl = document.querySelector("#target");
            const customDiv = document.querySelector("#custom-text");

            targetEl.addEventListener("targetFound", () => {
                customDiv.style.display = "block";
            });

            targetEl.addEventListener("targetLost", () => {
                customDiv.style.display = "none";
            });
        });
    </script>
</body>
</html>
