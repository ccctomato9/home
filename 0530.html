<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>人體骨骼 AR 介紹</title>
<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: "Microsoft JhengHei", sans-serif;
}
a-scene {
  width: 100%; height: 100%;
  position: fixed; top: 0; left: 0;
}
.mindar-ui-loading,
.mindar-ui-error,
.mindar-ui-scanning {
  display: none !important;
}

/* 覆蓋整個畫面的資訊面板 */
#info-panel {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  max-height: 45vh;
  overflow-y: auto;
  background: rgba(0, 0, 0, 0.82);
  color: white;
  z-index: 9999;
  box-sizing: border-box;
  padding: 16px 18px 20px;
  border-top: 3px solid #00cfff;
}
#info-panel h2 {
  margin: 0 0 8px 0;
  font-size: 1.3em;
  color: #00cfff;
}
#info-panel p {
  margin: 0;
  font-size: 0.95em;
  line-height: 1.7;
}

/* 掃描提示 */
#scan-hint {
  display: block;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 1.1em;
  background: rgba(0,0,0,0.5);
  padding: 10px 20px;
  border-radius: 8px;
  z-index: 9998;
  pointer-events: none;
  text-align: center;
}
</style>
</head>
<body>

<div id="scan-hint">📷 請對準骨骼圖片進行掃描</div>
<div id="info-panel">
  <h2 id="bone-title"></h2>
  <p id="bone-desc"></p>
</div>

<a-scene
  mindar-image="
    imageTargetSrc: targets.mind;
    autoStart: true;
    showStats: false;
    uiLoading: no;
    uiScanning: no;
    uiError: no;
    filterMinCF: 0.001;
    filterBeta: 0.01;
    missTolerance: 5;
    warmupTolerance: 5;
  "
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <img id="img-bone1" src="bone1.jpg" />
    <img id="img-bone2" src="bone2.jpg" />
    <img id="img-bone3" src="bone3.jpg" />
    <img id="img-bone4" src="bone4.jpg" />
    <img id="img-bone5" src="bone5.jpg" />
    <img id="img-bone6" src="bone6.jpg" />
    <img id="img-bone7" src="bone7.jpg" />
    <img id="img-bone8" src="bone8.jpg" />
    <img id="img-bone9" src="bone9.jpg" />
  </a-assets>

  <a-light type="ambient" intensity="3"></a-light>
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- bone1: 頭骨 -->
  <a-entity mindar-image-target="targetIndex: 0" id="target-0">
    <a-plane src="#img-bone1" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone2: 肩胛骨 -->
  <a-entity mindar-image-target="targetIndex: 1" id="target-1">
    <a-plane src="#img-bone2" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone3: 肱骨 (arm) -->
  <a-entity mindar-image-target="targetIndex: 2" id="target-2">
    <a-plane src="#img-bone3" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone4: 椎骨 (spine) -->
  <a-entity mindar-image-target="targetIndex: 3" id="target-3">
    <a-plane src="#img-bone4" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone5: 胸骨&肋骨 (rib) -->
  <a-entity mindar-image-target="targetIndex: 4" id="target-4">
    <a-plane src="#img-bone5" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone6: 掌骨&指骨 (hand) -->
  <a-entity mindar-image-target="targetIndex: 5" id="target-5">
    <a-plane src="#img-bone6" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone7: 髖骨 (butt) -->
  <a-entity mindar-image-target="targetIndex: 6" id="target-6">
    <a-plane src="#img-bone7" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone8: 股骨 (leg) -->
  <a-entity mindar-image-target="targetIndex: 7" id="target-7">
    <a-plane src="#img-bone8" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone9: 足部 (foot) -->
  <a-entity mindar-image-target="targetIndex: 8" id="target-8">
    <a-plane src="#img-bone9" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

</a-scene>

<script>
// ─── 骨骼資料 ───────────────────────────────────────────────
const boneData = [
  {
    title: "🦴 頭骨（Skull）",
    desc: `人類頭骨通常由22塊骨頭組成。除了下頜骨，骨頭間是由骨縫連接，只允許微量的運動。\n\n8塊骨頭組成腦顱，容納並保護整個腦部，包括大腦和腦幹（即中腦、小腦，腦橋和延髓）；14塊骨頭組成面顱，支撐面部並形成面部輪廓；顳骨包住中耳的6塊聽小骨。`
  },
  {
    title: "🦴 肩胛骨（Scapula）",
    desc: `肩胛骨（scapula）位於胸廓背部，是組成胸帶的三塊骨骼之一，在第2至第7肋骨的高度，為一大的三角形扁平骨。動物的肩胛骨也叫扇骨。\n\n他們的內側緣離脊柱約5公分。`
  },
  {
    title: "🦴 肱骨（Humerus）",
    desc: `肱骨（humerus）是肩到肘的長骨，是上臂的一部分。它將肩胛骨和前臂的橈骨和尺骨連接起來。\n\n肱骨由三部分組成。肱骨上端包括一個球型部分、一個較窄的頸部及兩個小突起，分別稱為大結節、小結節。肱骨幹上半部為圓柱形，下半部則較似稜柱。肱骨下端包含兩個上髁、兩個突起（肱骨滑車和肱骨小頭）及三個窩（冠狀窩、橈骨窩和鷹嘴窩）。`
  },
  {
    title: "🦴 椎骨（Vertebra）",
    desc: `椎骨又稱脊椎骨、脊椎，是組成脊椎動物脊柱的不規則骨，屬於構成中軸骨核心的主要骨骼系統結構構件，成年後可作為主要的造血組織。典型椎骨包括椎體、椎弓、棘突和橫突、關節突等部分。\n\n依動物種類不同，椎骨可為硬骨或軟骨。哺乳動物則根據椎骨所在部位不同分為頸椎、胸椎、腰椎、薦椎、尾椎等。`
  },
  {
    title: "🦴 胸骨 & 肋骨（Sternum & Rib）",
    desc: `胸骨（Sternum）是胸廓前方一塊長形扁平，領帶狀骨，接有肋。\n\n肋骨（rib）是胸廓中的枝狀骨，呈細長呈弓形的扁骨，在背部與相應的胸椎相連，由後上方向前下方傾斜，在人體有12對。動物的頭側肋骨藉由肋軟骨與胸骨相連，尾側肋骨一般不與胸骨相連。肋則包括肋骨（ribs）和肋軟骨（costal cartilages）。`
  },
  {
    title: "🦴 掌骨 & 指骨（Metacarpal & Phalanges）",
    desc: `掌骨是手部骨骼中間的部份，連接在近端手指及腕骨之間，而腕骨再與前臂連結。\n\n指骨共14塊，均為長骨。拇指僅有兩節指骨；第二至五指各有三節指骨。各指的指骨由近側至遠側依次叫近節指骨、中節指骨、遠節指骨。其中拇指無中節指骨。每節指骨的近側端叫做指骨底。近節指骨與中節指骨的遠側端呈滑輪狀，叫做指骨滑車。遠節指骨遠側端的掌面膨大粗糙，叫做遠節指骨粗隆。`
  },
  {
    title: "🦴 髖骨（Hip Bone）",
    desc: `髖骨（hip bone）又稱胯骨、髀骨，為人體腰部至臀部的大型骨骼，共左右兩塊。\n\n幼年時，髖骨分為髂骨、坐骨和恥骨以及軟骨連接。成年後，它們之間的軟骨會骨化，成為一個整體，即髖骨。左髖骨、右髖骨、骶骨、尾骨以及它們之間的骨連接一起構成骨盆。髖骨與股骨構成髖關節。`
  },
  {
    title: "🦴 股骨（Femur）",
    desc: `股骨（femur）俗稱大腿骨（thigh bone），是人體中最長、最大的管狀骨，位於大腿，分為一體及上、下兩端。在四肢動物，位於下肢（或後肢）深面。\n\n股骨上端彎曲，此彎曲部稱作股骨頸（femoral neck）。這種彎曲連接能有效降低外界對骨盆的衝擊，股骨頸有如一緩衝器。股骨頸上方有股骨頭（femoral head），近圓形，其關節面與骨盆的髖臼形成髖關節。`
  },
  {
    title: "🦴 足部（Foot Bones）",
    desc: `跗骨指的是四足類動物足部七塊骨骼組成的短骨群，位於脛骨、腓骨、蹠骨之間。它由中足（骰骨、三個楔骨、足舟骨）和後足（距骨和跟骨）組成。跗骨與蹠骨形成關節，而蹠骨又與近端趾骨形成關節。\n\n蹠骨為足部的一個長骨群，共有五塊，位於中後足的跗骨與腳趾的趾骨之間，從內側到外側依次命名為第一至第五蹠骨。人類最大的跗骨是跟骨，是位於足跟的負重骨骼。\n\n趾骨是大多數脊椎動物指頭處的骨骼，在靈長類動物身上，拇趾通常有兩節趾骨，而其餘趾頭則有三節，被歸類為長骨。`
  }
];

// ─── UI 元素 ─────────────────────────────────────────────────
const panel    = document.getElementById('info-panel');
const titleEl  = document.getElementById('bone-title');
const descEl   = document.getElementById('bone-desc');
const hint     = document.getElementById('scan-hint');

function showInfo(index) {
  const data = boneData[index];
  titleEl.textContent = data.title;
  descEl.textContent  = data.desc;
  panel.style.display = 'block';
  hint.style.display  = 'none';
}

function hideInfo() {
  // 只有所有 target 都遺失才隱藏
  const anyFound = activeTargets.size > 0;
  if (!anyFound) {
    panel.style.display = 'none';
    hint.style.display  = 'block';
  }
}

const activeTargets = new Set();

// ─── 綁定 9 個 target 事件 ────────────────────────────────────
window.addEventListener("load", () => {
  for (let i = 0; i < 9; i++) {
    const el = document.getElementById(`target-${i}`);
    if (!el) continue;

    el.addEventListener("targetFound", () => {
      activeTargets.add(i);
      showInfo(i);
    });

    el.addEventListener("targetLost", () => {
      activeTargets.delete(i);
      hideInfo();
    });
  }
});

// ─── touch-transform 組件（縮放、旋轉、雙擊重設）─────────────
AFRAME.registerComponent('touch-transform', {
  init: function () {
    const el = this;
    this.defaultScale = 1;
    this.currentScale = 1;
    this.prevDistance = null;
    this.prevAngle    = null;
    this.lastTap      = 0;

    this.el.addEventListener('click', () => {
      const now = Date.now();
      if (now - this.lastTap < 300) {
        this.el.object3D.scale.set(1, 1, 1);
        this.el.object3D.rotation.set(0, 0, 0);
        this.currentScale = 1;
      }
      this.lastTap = now;
    });

    const canvas = this.el.sceneEl.canvas;

    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        this.prevDistance = Math.hypot(dx, dy);
        this.prevAngle    = Math.atan2(dy, dx);
      }
    });

    canvas.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && this.prevDistance !== null) {
        const dx   = e.touches[0].clientX - e.touches[1].clientX;
        const dy   = e.touches[0].clientY - e.touches[1].clientY;
        const dist  = Math.hypot(dx, dy);
        const angle = Math.atan2(dy, dx);

        this.currentScale *= dist / this.prevDistance;
        this.currentScale  = Math.min(Math.max(this.currentScale, 0.3), 4);
        this.el.object3D.scale.set(
          this.currentScale, this.currentScale, this.currentScale
        );

        const deltaAngle = angle - this.prevAngle;
        const rot = this.el.object3D.rotation;
        this.el.object3D.rotation.set(rot.x, rot.y, rot.z + deltaAngle);

        this.prevDistance = dist;
        this.prevAngle    = angle;
        e.preventDefault();
      }
    }, { passive: false });

    canvas.addEventListener('touchend', () => {
      this.prevDistance = null;
      this.prevAngle    = null;
    });
  }
});
</script>
</body>
</html>
