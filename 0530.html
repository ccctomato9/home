<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>人體骨骼 AR 介紹</title>
<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: "Microsoft JhengHei", BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  background-color: transparent;
}
a-scene {
  width: 100%; height: 100%;
  position: fixed; top: 0; left: 0;
}
.mindar-ui-loading,
.mindar-ui-error,
.mindar-ui-scanning {
  display: none !important;
}

#info-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  max-height: 40vh; 
  overflow-y: auto;
  
  background: rgba(6, 6, 6, 0.486);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  
  color: #ffffff;
  z-index: 9999;
  box-sizing: border-box;
  padding: 12px 28px 32px; 

  border-top: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 20px 20px 0 0;
  box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.5);
  
  transform: translateY(100%);
  visibility: hidden;
  opacity: 0;
  transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease, visibility 0.4s;
}

#info-panel::before {
  content: '';
  display: block;
  width: 40px;
  height: 4px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 2px;
  margin: 0 auto 20px;
}

#info-panel.active {
  transform: translateY(0);
  visibility: visible;
  opacity: 1;
}

#info-panel h2 {
  margin: 0 0 14px 0;
  font-size: 1.25em;
  font-weight: 600;
  color: #ffffff; 
  letter-spacing: 0.5px;
  border-bottom: 1px solid rgb(122, 194, 210); 
  padding-bottom: 12px;
}

#info-panel p {
  margin: 0;
  font-size: 0.95em;
  line-height: 1.8;
  color: #d1d5db; 
  text-align: justify;
}

#info-panel::-webkit-scrollbar {
  width: 4px;
}
#info-panel::-webkit-scrollbar-track {
  background: transparent;
}
#info-panel::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.2);
  border-radius: 2px;
}


#scan-hint {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9998;
  pointer-events: none;
  
  color: #ffffff;
  font-size: 0.95rem;
  letter-spacing: 1px;
  background: rgba(20, 20, 20, 0.85);
  padding: 11px 26px;
  border-radius: 8px;
  border: 1px solid rgba(86, 184, 220, 0.442);
  
  transition: opacity 0.3s ease, visibility 0.3s ease;
}

#scan-hint.hidden {
  opacity: 0;
  visibility: hidden;
}
</style>
</head>
<body>

<div id="scan-hint">📷 請對準圖片掃描</div>

<div id="info-panel">
  <h2 id="bone-title"></h2>
  <p id="bone-desc"></p>
</div>

<a-scene
  mindar-image="
    imageTargetSrc: targets.mind;
    autoStart: true;
    showStats: false;
    uiLoading: no;
    uiScanning: no;
    uiError: no;
    filterMinCF: 0.001;
    filterBeta: 0.01;
    missTolerance: 5;
    warmupTolerance: 5;
  "
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <img id="img-bone1" src="card1.jpg" />
    <img id="img-bone2" src="card2.jpg" />
    <img id="img-bone3" src="card3.jpg" />
    <img id="img-bone4" src="card4.jpg" />
    <img id="img-bone5" src="card5.jpg" />
    <img id="img-bone6" src="card6.jpg" />
    <img id="img-bone7" src="card7.jpg" />
    <img id="img-bone8" src="card8.jpg" />
    <img id="img-bone9" src="card9.jpg" />
  </a-assets>

  <a-light type="ambient" intensity="3"></a-light>
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

 <a-entity mindar-image-target="targetIndex: 0" id="target-0">
    <a-plane src="#img-bone1" width="1" auto-ratio touch-transform></a-plane>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 1" id="target-1">
    <a-plane src="#img-bone2" width="1" auto-ratio touch-transform></a-plane>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 2" id="target-2">
    <a-plane src="#img-bone3" width="1" auto-ratio touch-transform></a-plane> </a-entity>

  <a-entity mindar-image-target="targetIndex: 3" id="target-3">
    <a-plane src="#img-bone4" width="1" auto-ratio touch-transform></a-plane>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 4" id="target-4">
    <a-plane src="#img-bone5" width="1" auto-ratio touch-transform></a-plane>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 5" id="target-5">
    <a-plane src="#img-bone6" width="1" auto-ratio touch-transform></a-plane>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 6" id="target-6">
    <a-plane src="#img-bone7" width="1" auto-ratio touch-transform></a-plane>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 7" id="target-7">
    <a-plane src="#img-bone8" width="1" auto-ratio touch-transform></a-plane>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 8" id="target-8">
    <a-plane src="#img-bone9" width="1" auto-ratio touch-transform></a-plane>
  </a-entity>
</a-scene>

<script>
  FRAME.registerComponent('auto-ratio', {
  init: function () {
    const el = this.el;
    const srcSelector = el.getAttribute('src');
    if (!srcSelector) return;

    const img = document.querySelector(srcSelector);
    if (!img) return;

    const calculateRatio = () => {
      const naturalWidth = img.naturalWidth;
      const naturalHeight = img.naturalHeight;
      
      if (naturalWidth && naturalHeight) {
        el.setAttribute('width', 1);
        el.setAttribute('height', naturalHeight / naturalWidth);
      }
    };

    if (img.complete) {
      calculateRatio();
    } else {
      img.addEventListener('load', calculateRatio);
    }
  }
});
const boneData = [
  {
    title: "🦴 頭骨（Skull）",
    desc: `男女有別： 成年人的頭骨可以透過外觀分辨性別。男性的頭骨通常較為厚重，眉骨較突出，下顎角較方；女性的頭骨則較輕薄，額頭較平滑，輪廓較圓潤。`
  },
  {
    title: "🦴 肩胛骨（Scapula）",
    desc: `唯一「懸浮」的骨頭：人體多數骨頭藉由關節與主幹緊密相連，但肩胛骨主要是靠周圍 17 條肌肉將其「拉住」並浮貼於肋骨上，這也是為什麼它能靈活滑動。`
  },
  {
    title: "🦴 小知識（Humerus）",
    desc: `隨著年齡的增長，身體骨頭的數量實際上是會減少的。新生嬰兒的小骨架裡有近270塊骨頭。隨著身體的成熟，較小的骨頭會融合在一起形成更複雜的形狀。人類頭骨由22片骨骼組成，當我們成長時，它們會融合在一起。到成年時，人類身體只有206塊骨頭。`
  },
  {
    title: "🦴 椎骨（Vertebra）",
    desc: `椎骨中的腰椎承受上半身大部分重量，是活動與受力最頻繁的區域，最容易發生椎間盤突出或下背痛。`
  },
  {
    title: "🦴 胸骨 & 肋骨（Sternum & Rib）",
    desc: `胸骨沒有硬骨直接相連，而胸骨下方突出的「劍突」在年輕時是軟骨，通常要到成年後才會逐漸骨化。`
  },
  {
    title: "🦴 掌骨 & 指骨（Metacarpal & Phalanges）",
    desc: `正常成年人的單手加上腕骨共有 27 塊骨頭。手部骨骼由以下三個主要部分組成：位於手腕處的腕骨，由兩排不規則的小骨頭組成，負責手腕的靈活性。掌骨（5 塊）：構成手掌的基礎，連接手腕與手指。指骨（14 塊）：構成手指的骨頭。除了大拇指有 2 塊指骨外，其餘四根手指各有 3 塊。`
  },
  {
    title: "🦴 髖骨（Hip Bone）",
    desc: `退化性髖關節炎患者常以為關節像輪胎會磨損，因此減少走動，但最新醫學觀點指出，久坐不動才是髖關節最大的風險。適當的負重運動（如快走、慢跑）能促進關節液循環、增加骨質密度。`
  },
  {
    title: "🦴 股骨（Femur）",
    desc: `股骨（大腿骨）是人體中最長和最堅固的骨骼。一些專家甚至提出假設：股骨比一塊相同重量的鋼鐵更堅固。而全身最短的骨頭是鐙骨（中耳的骨頭）。`
  },
  {
    title: "🦴 足部（Foot Bones）",
    desc: `單一隻腳掌就包含了 26 塊骨頭，而這26塊骨頭巧妙地組成了我們常見的「足弓」，當我們走路或跑步時，足弓會像彈簧一樣伸縮，吸收龐大的反作用力。`
  }
];

const panel    = document.getElementById('info-panel');
const titleEl  = document.getElementById('bone-title');
const descEl   = document.getElementById('bone-desc');
const hint     = document.getElementById('scan-hint');

function showInfo(index) {
  const data = boneData[index];
  titleEl.textContent = data.title;
  descEl.textContent  = data.desc;
  
  panel.classList.add('active');
  hint.classList.add('hidden');
}

function hideInfo() {
  const anyFound = activeTargets.size > 0;
  if (!anyFound) {
    panel.classList.remove('active');
    hint.classList.remove('hidden');
  }
}

const activeTargets = new Set();

window.addEventListener("load", () => {
  for (let i = 0; i < 9; i++) {
    const el = document.getElementById(`target-${i}`);
    if (!el) continue;

    el.addEventListener("targetFound", () => {
      activeTargets.add(i);
      showInfo(i);
    });

    el.addEventListener("targetLost", () => {
      activeTargets.delete(i);
      hideInfo();
    });
  }
});
AFRAME.registerComponent('touch-transform', {
  init: function () {
    const el = this;
    this.defaultScale = 1;
    this.currentScale = 1;
    this.prevDistance = null;
    this.prevAngle    = null;
    this.lastTap      = 0;

    this.el.addEventListener('click', () => {
      const now = Date.now();
      if (now - this.lastTap < 300) {
        this.el.object3D.scale.set(1, 1, 1);
        this.el.object3D.rotation.set(0, 0, 0);
        this.currentScale = 1;
      }
      this.lastTap = now;
    });

    const canvas = this.el.sceneEl.canvas;

    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        this.prevDistance = Math.hypot(dx, dy);
        this.prevAngle    = Math.atan2(dy, dx);
      }
    });

    canvas.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && this.prevDistance !== null) {
        const dx   = e.touches[0].clientX - e.touches[1].clientX;
        const dy   = e.touches[0].clientY - e.touches[1].clientY;
        const dist  = Math.hypot(dx, dy);
        const angle = Math.atan2(dy, dx);

        this.currentScale *= dist / this.prevDistance;
        this.currentScale  = Math.min(Math.max(this.currentScale, 0.3), 4);
        this.el.object3D.scale.set(
          this.currentScale, this.currentScale, this.currentScale
        );

        const deltaAngle = angle - this.prevAngle;
        const rot = this.el.object3D.rotation;
        this.el.object3D.rotation.set(rot.x, rot.y, rot.z + deltaAngle);

        this.prevDistance = dist;
        this.prevAngle    = angle;
        e.preventDefault();
      }
    }, { passive: false });

    canvas.addEventListener('touchend', () => {
      this.prevDistance = null;
      this.prevAngle    = null;
    });
  }
});
</script>
</body>
</html>
