<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>人體骨骼 AR 介紹</title>
<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: "Microsoft JhengHei", sans-serif;
}
a-scene {
  width: 100%; height: 100%;
  position: fixed; top: 0; left: 0;
}
.mindar-ui-loading,
.mindar-ui-error,
.mindar-ui-scanning {
  display: none !important;
}

/* 覆蓋整個畫面的資訊面板 */
#info-panel {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  max-height: 45vh;
  overflow-y: auto;
  background: rgba(0, 0, 0, 0.82);
  color: white;
  z-index: 9999;
  box-sizing: border-box;
  padding: 16px 18px 20px;
  border-top: 3px solid #00cfff;
}
#info-panel h2 {
  margin: 0 0 8px 0;
  font-size: 1.3em;
  color: #00cfff;
}
#info-panel p {
  margin: 0;
  font-size: 0.95em;
  line-height: 1.7;
}

/* 掃描提示 */
#scan-hint {
  display: block;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 1.1em;
  background: rgba(0,0,0,0.5);
  padding: 10px 20px;
  border-radius: 8px;
  z-index: 9998;
  pointer-events: none;
  text-align: center;
}
</style>
</head>
<body>

<div id="scan-hint">📷 請對準骨骼圖片進行掃描</div>
<div id="info-panel">
  <h2 id="bone-title"></h2>
  <p id="bone-desc"></p>
</div>

<a-scene
  mindar-image="
    imageTargetSrc: targets.mind;
    autoStart: true;
    showStats: false;
    uiLoading: no;
    uiScanning: no;
    uiError: no;
    filterMinCF: 0.001;
    filterBeta: 0.01;
    missTolerance: 5;
    warmupTolerance: 5;
  "
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <img id="img-bone1" src="card1.jpg" />
    <img id="img-bone2" src="card2.jpg" />
    <img id="img-bone3" src="card3.jpg" />
    <img id="img-bone4" src="card4.jpg" />
    <img id="img-bone5" src="card5.jpg" />
    <img id="img-bone6" src="card6.jpg" />
    <img id="img-bone7" src="card7.jpg" />
    <img id="img-bone8" src="card8.jpg" />
    <img id="img-bone9" src="card9.jpg" />
  </a-assets>

  <a-light type="ambient" intensity="3"></a-light>
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- bone1: 頭骨 -->
  <a-entity mindar-image-target="targetIndex: 0" id="target-0">
    <a-plane src="#img-bone1" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone2: 肩胛骨 -->
  <a-entity mindar-image-target="targetIndex: 1" id="target-1">
    <a-plane src="#img-bone2" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone3: 肱骨 (arm) -->
  <a-entity mindar-image-target="targetIndex: 2" id="target-2">
    <a-plane src="#img-bone3" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone4: 椎骨 (spine) -->
  <a-entity mindar-image-target="targetIndex: 3" id="target-3">
    <a-plane src="#img-bone4" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone5: 胸骨&肋骨 (rib) -->
  <a-entity mindar-image-target="targetIndex: 4" id="target-4">
    <a-plane src="#img-bone5" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone6: 掌骨&指骨 (hand) -->
  <a-entity mindar-image-target="targetIndex: 5" id="target-5">
    <a-plane src="#img-bone6" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone7: 髖骨 (butt) -->
  <a-entity mindar-image-target="targetIndex: 6" id="target-6">
    <a-plane src="#img-bone7" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone8: 股骨 (leg) -->
  <a-entity mindar-image-target="targetIndex: 7" id="target-7">
    <a-plane src="#img-bone8" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

  <!-- bone9: 足部 (foot) -->
  <a-entity mindar-image-target="targetIndex: 8" id="target-8">
    <a-plane src="#img-bone9" width="1.2" height="0.85"
      position="0 0 0" touch-transform></a-plane>
  </a-entity>

</a-scene>

<script>
// ─── 骨骼資料 ───────────────────────────────────────────────
const boneData = [
  {
    title: "🦴 頭骨（Skull）",
    desc: `（男女有別： 成年人的頭骨可以透過外觀分辨性別。男性的頭骨通常較為厚重，眉骨較突出，下顎角較方；女性的頭骨則較輕薄，額頭較平滑，輪廓較圓潤。`
  },
  {
    title: "🦴 肩胛骨（Scapula）",
    desc: `唯一「懸浮」的骨頭：人體多數骨頭藉由關節與主幹緊密相連，但肩胛骨主要是靠周圍 17 條肌肉將其「拉住」並浮貼於肋骨上，這也是為什麼它能靈活滑動。`
  },
  {
    title: "🦴 小知識（Humerus）",
    desc: `隨著年齡的增長，身體骨頭的數量實際上是會減少的。新生嬰兒的小骨架裡有近270塊骨頭。隨著身體的成熟，較小的骨頭會融合在一起形成更複雜的形狀。人類頭骨由22片骨骼組成，當我們成長時，它們會融合在一起。到成年時，人類身體只有206塊骨頭。`
  },
  {
    title: "🦴 椎骨（Vertebra）",
    desc: `椎骨中的腰椎承受上半身大部分重量，是活動與受力最頻繁的區域，最容易發生椎間盤突出或下背痛。`
  },
  {
    title: "🦴 胸骨 & 肋骨（Sternum & Rib）",
    desc: `胸骨沒有硬骨直接相連，而胸骨下方突出的「劍突」在年輕時是軟骨，通常要到成年後才會逐漸骨化。`
  },
  {
    title: "🦴 掌骨 & 指骨（Metacarpal & Phalanges）",
    desc: `。正常成年人的單手加上腕骨共有 27 塊骨頭。手部骨骼由以下三個主要部分組成：位於手腕處的腕骨，由兩排不規則的小骨頭組成，負責手腕的靈活性。掌骨（5 塊）：構成手掌的基礎，連接手腕與手指。指骨（14 塊）：構成手指的骨頭。除了大拇指有 2 塊指骨外，其餘四根手指各有 3 塊。。`
  },
  {
    title: "🦴 髖骨（Hip Bone）",
    desc: `退化性髖關節炎患者常以為關節像輪胎會磨損，因此減少走動，但最新醫學觀點指出，久坐不動才是髖關節最大的風險。適當的負重運動（如快走、慢跑）能促進關節液循環、增加骨質密度。`
  },
  {
    title: "🦴 股骨（Femur）",
    desc: `股骨（大腿骨）是人體中最長和最堅固的骨骼。一些專家甚至提出假設：股骨比一塊相同重量的鋼鐵更堅固。而全身最短的骨頭是鐙骨（中耳的骨頭）。`
  },
  {
    title: "🦴 足部（Foot Bones）",
    desc: `單一隻腳掌就包含了 26 塊骨頭，而這26塊骨頭巧妙地組成了我們常見的「足弓」，當我們走路或跑步時，足弓會像彈簧一樣伸縮，吸收龐大的反作用力。`
  }
];

// ─── UI 元素 ─────────────────────────────────────────────────
const panel    = document.getElementById('info-panel');
const titleEl  = document.getElementById('bone-title');
const descEl   = document.getElementById('bone-desc');
const hint     = document.getElementById('scan-hint');

function showInfo(index) {
  const data = boneData[index];
  titleEl.textContent = data.title;
  descEl.textContent  = data.desc;
  panel.style.display = 'block';
  hint.style.display  = 'none';
}

function hideInfo() {
  // 只有所有 target 都遺失才隱藏
  const anyFound = activeTargets.size > 0;
  if (!anyFound) {
    panel.style.display = 'none';
    hint.style.display  = 'block';
  }
}

const activeTargets = new Set();

// ─── 綁定 9 個 target 事件 ────────────────────────────────────
window.addEventListener("load", () => {
  for (let i = 0; i < 9; i++) {
    const el = document.getElementById(`target-${i}`);
    if (!el) continue;

    el.addEventListener("targetFound", () => {
      activeTargets.add(i);
      showInfo(i);
    });

    el.addEventListener("targetLost", () => {
      activeTargets.delete(i);
      hideInfo();
    });
  }
});

// ─── touch-transform 組件（縮放、旋轉、雙擊重設）─────────────
AFRAME.registerComponent('touch-transform', {
  init: function () {
    const el = this;
    this.defaultScale = 1;
    this.currentScale = 1;
    this.prevDistance = null;
    this.prevAngle    = null;
    this.lastTap      = 0;

    this.el.addEventListener('click', () => {
      const now = Date.now();
      if (now - this.lastTap < 300) {
        this.el.object3D.scale.set(1, 1, 1);
        this.el.object3D.rotation.set(0, 0, 0);
        this.currentScale = 1;
      }
      this.lastTap = now;
    });

    const canvas = this.el.sceneEl.canvas;

    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        this.prevDistance = Math.hypot(dx, dy);
        this.prevAngle    = Math.atan2(dy, dx);
      }
    });

    canvas.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && this.prevDistance !== null) {
        const dx   = e.touches[0].clientX - e.touches[1].clientX;
        const dy   = e.touches[0].clientY - e.touches[1].clientY;
        const dist  = Math.hypot(dx, dy);
        const angle = Math.atan2(dy, dx);

        this.currentScale *= dist / this.prevDistance;
        this.currentScale  = Math.min(Math.max(this.currentScale, 0.3), 4);
        this.el.object3D.scale.set(
          this.currentScale, this.currentScale, this.currentScale
        );

        const deltaAngle = angle - this.prevAngle;
        const rot = this.el.object3D.rotation;
        this.el.object3D.rotation.set(rot.x, rot.y, rot.z + deltaAngle);

        this.prevDistance = dist;
        this.prevAngle    = angle;
        e.preventDefault();
      }
    }, { passive: false });

    canvas.addEventListener('touchend', () => {
      this.prevDistance = null;
      this.prevAngle    = null;
    });
  }
});
</script>
</body>
</html>
